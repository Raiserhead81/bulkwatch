server {
    listen 443 ssl http2;
    server_name travelguide.gemivo.de;

    ssl_certificate /etc/ssl/certs/gemivo-wildcard.pem;
    ssl_certificate_key /etc/ssl/private/gemivo-wildcard.key;

    # Allow large image uploads (up to ~15 MB)
    client_max_body_size 15m;

    location / {
        proxy_pass http://127.0.0.1:3092;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Long timeout for AI analysis (VLM + LLM can take up to 90s)
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }
}

server {
    listen 80;
    server_name travelguide.gemivo.de;
    return 301 https://$server_name$request_uri;
}
