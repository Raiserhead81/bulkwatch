<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" style="background:linear-gradient(135deg,#1e3a5f,#0a1628)">
  <defs>
    <linearGradient id="water" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a6b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a1a3a;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Ocean -->
  <rect width="800" height="450" fill="url(#water)"/>
  <!-- Wave lines -->
  <path d="M0 350 Q100 340 200 350 Q300 360 400 350 Q500 340 600 350 Q700 360 800 350 L800 450 L0 450Z" fill="#0f2a50" opacity="0.6"/>
  <path d="M0 370 Q150 358 300 370 Q450 382 600 370 Q700 362 800 370 L800 450 L0 450Z" fill="#0a1e3d" opacity="0.8"/>
  <!-- Ship hull -->
  <path d="M150 280 L650 280 L680 340 L120 340Z" fill="#2c5f8a" stroke="#4a90c4" stroke-width="2"/>
  <!-- Ship superstructure -->
  <rect x="280" y="200" width="200" height="80" rx="4" fill="#1e4a70" stroke="#3a7ab0" stroke-width="1.5"/>
  <!-- Bridge windows -->
  <rect x="300" y="215" width="30" height="20" rx="2" fill="#7ab8e0" opacity="0.8"/>
  <rect x="345" y="215" width="30" height="20" rx="2" fill="#7ab8e0" opacity="0.8"/>
  <rect x="390" y="215" width="30" height="20" rx="2" fill="#7ab8e0" opacity="0.8"/>
  <rect x="435" y="215" width="30" height="20" rx="2" fill="#7ab8e0" opacity="0.8"/>
  <!-- Mast -->
  <line x1="400" y1="140" x2="400" y2="200" stroke="#4a90c4" stroke-width="3"/>
  <line x1="340" y1="160" x2="460" y2="160" stroke="#4a90c4" stroke-width="2"/>
  <!-- Cargo holds -->
  <rect x="160" y="250" width="100" height="30" rx="2" fill="#1a3a5a" stroke="#3a6a9a" stroke-width="1"/>
  <rect x="280" y="250" width="100" height="30" rx="2" fill="#1a3a5a" stroke="#3a6a9a" stroke-width="1"/>
  <rect x="420" y="250" width="100" height="30" rx="2" fill="#1a3a5a" stroke="#3a6a9a" stroke-width="1"/>
  <rect x="540" y="250" width="100" height="30" rx="2" fill="#1a3a5a" stroke="#3a6a9a" stroke-width="1"/>
  <!-- Light reflection on water -->
  <ellipse cx="400" cy="390" rx="120" ry="15" fill="#2a5a9a" opacity="0.3"/>
</svg>
