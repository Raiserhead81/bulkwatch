<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Anchor base shape -->
  <path d="M32 22V54" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>
  <path d="M18 44c0 9 6.3 13 14 13s14-4 14-13" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>
  <path d="M23 30h18" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>

  <!-- Neural network replaces anchor ring -->
  <!-- Layer 1 (top) -->
  <circle cx="26" cy="6" r="2.5" fill="#2563eb" stroke="#38bdf8" stroke-width="1"/>
  <circle cx="38" cy="6" r="2.5" fill="#2563eb" stroke="#38bdf8" stroke-width="1"/>
  
  <!-- Layer 2 (middle) -->
  <circle cx="22" cy="15" r="2.5" fill="#3b82f6" stroke="#38bdf8" stroke-width="1"/>
  <circle cx="32" cy="13" r="3" fill="#2563eb" stroke="#38bdf8" stroke-width="1.5"/>
  <circle cx="42" cy="15" r="2.5" fill="#3b82f6" stroke="#38bdf8" stroke-width="1"/>
  
  <!-- Layer 3 (bottom, connects to anchor) -->
  <circle cx="26" cy="23" r="2" fill="#60a5fa" stroke="#38bdf8" stroke-width="1"/>
  <circle cx="38" cy="23" r="2" fill="#60a5fa" stroke="#38bdf8" stroke-width="1"/>

  <!-- Neural connections L1→L2 -->
  <line x1="26" y1="8" x2="22" y2="13" stroke="#60a5fa" stroke-width="1" opacity="0.5"/>
  <line x1="26" y1="8" x2="32" y2="11" stroke="#60a5fa" stroke-width="1.2" opacity="0.7"/>
  <line x1="26" y1="8" x2="42" y2="13" stroke="#60a5fa" stroke-width="0.7" opacity="0.3"/>
  <line x1="38" y1="8" x2="22" y2="13" stroke="#60a5fa" stroke-width="0.7" opacity="0.3"/>
  <line x1="38" y1="8" x2="32" y2="11" stroke="#60a5fa" stroke-width="1.2" opacity="0.7"/>
  <line x1="38" y1="8" x2="42" y2="13" stroke="#60a5fa" stroke-width="1" opacity="0.5"/>
  
  <!-- Neural connections L2→L3 -->
  <line x1="22" y1="17" x2="26" y2="21" stroke="#60a5fa" stroke-width="1" opacity="0.5"/>
  <line x1="22" y1="17" x2="38" y2="21" stroke="#60a5fa" stroke-width="0.7" opacity="0.3"/>
  <line x1="32" y1="16" x2="26" y2="21" stroke="#60a5fa" stroke-width="1.2" opacity="0.7"/>
  <line x1="32" y1="16" x2="38" y2="21" stroke="#60a5fa" stroke-width="1.2" opacity="0.7"/>
  <line x1="42" y1="17" x2="38" y2="21" stroke="#60a5fa" stroke-width="1" opacity="0.5"/>
  <line x1="42" y1="17" x2="26" y2="21" stroke="#60a5fa" stroke-width="0.7" opacity="0.3"/>

  <!-- Data pulse dots on anchor shaft -->
  <circle cx="32" cy="36" r="1.5" fill="#38bdf8" opacity="0.5"/>
  <circle cx="32" cy="44" r="1.2" fill="#38bdf8" opacity="0.3"/>
</svg>
