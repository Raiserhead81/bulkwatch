<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="108" fill="#0f172a"/>
  <rect x="20" y="20" width="472" height="472" rx="90" fill="url(#g)"/>
  <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1e293b"/><stop offset="100%" stop-color="#0f172a"/></linearGradient></defs>
  <g transform="translate(256,240)" fill="none" stroke="#38bdf8" stroke-width="18" stroke-linecap="round" stroke-linejoin="round">
    <!-- Ship hull -->
    <path d="M-140,40 L-120,-20 L120,-20 L140,40 Z" fill="#1e3a5f" stroke="#38bdf8"/>
    <!-- Bridge -->
    <rect x="40" y="-60" width="60" height="40" rx="4" fill="#1e3a5f" stroke="#38bdf8" stroke-width="12"/>
    <!-- Mast -->
    <line x1="0" y1="-20" x2="0" y2="-90"/>
    <!-- Crane -->
    <line x1="-60" y1="-20" x2="-80" y2="-70"/>
    <line x1="-80" y1="-70" x2="-30" y2="-70"/>
    <!-- Water line -->
    <path d="M-180,60 Q-140,80 -100,60 Q-60,40 -20,60 Q20,80 60,60 Q100,40 140,60 Q180,80 220,60" stroke="#38bdf8" stroke-width="8" opacity="0.4"/>
  </g>
  <!-- Text -->
  <text x="256" y="400" text-anchor="middle" font-family="system-ui,sans-serif" font-size="56" font-weight="800" fill="#38bdf8">VESSEL</text>
  <text x="256" y="445" text-anchor="middle" font-family="system-ui,sans-serif" font-size="28" font-weight="500" fill="#64748b">DATABASE</text>
</svg>
