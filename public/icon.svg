<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Neural Network Background — 3 layers, subtle -->
  <g opacity="0.18" stroke="#38bdf8" stroke-width="0.7" fill="none">
    <!-- Connections: Layer 1 → Layer 2 -->
    <line x1="10" y1="14" x2="24" y2="10"/>
    <line x1="10" y1="14" x2="24" y2="22"/>
    <line x1="10" y1="14" x2="24" y2="34"/>
    <line x1="10" y1="32" x2="24" y2="22"/>
    <line x1="10" y1="32" x2="24" y2="34"/>
    <line x1="10" y1="32" x2="24" y2="46"/>
    <line x1="10" y1="50" x2="24" y2="34"/>
    <line x1="10" y1="50" x2="24" y2="46"/>
    <line x1="10" y1="50" x2="24" y2="56"/>
    <!-- Connections: Layer 2 → Layer 3 -->
    <line x1="24" y1="10" x2="40" y2="18"/>
    <line x1="24" y1="10" x2="40" y2="32"/>
    <line x1="24" y1="22" x2="40" y2="18"/>
    <line x1="24" y1="22" x2="40" y2="32"/>
    <line x1="24" y1="22" x2="40" y2="46"/>
    <line x1="24" y1="34" x2="40" y2="18"/>
    <line x1="24" y1="34" x2="40" y2="32"/>
    <line x1="24" y1="34" x2="40" y2="46"/>
    <line x1="24" y1="46" x2="40" y2="32"/>
    <line x1="24" y1="46" x2="40" y2="46"/>
    <line x1="24" y1="56" x2="40" y2="46"/>
    <!-- Connections: Layer 3 → Layer 4 -->
    <line x1="40" y1="18" x2="54" y2="22"/>
    <line x1="40" y1="18" x2="54" y2="38"/>
    <line x1="40" y1="32" x2="54" y2="22"/>
    <line x1="40" y1="32" x2="54" y2="38"/>
    <line x1="40" y1="46" x2="54" y2="38"/>
    <line x1="40" y1="46" x2="54" y2="52"/>
    <line x1="40" y1="18" x2="54" y2="52"/>
  </g>
  <!-- Neural Network Nodes -->
  <g fill="#38bdf8">
    <!-- Layer 1 -->
    <circle cx="10" cy="14" r="1.8" opacity="0.25"/>
    <circle cx="10" cy="32" r="1.8" opacity="0.25"/>
    <circle cx="10" cy="50" r="1.8" opacity="0.25"/>
    <!-- Layer 2 -->
    <circle cx="24" cy="10" r="1.6" opacity="0.2"/>
    <circle cx="24" cy="22" r="1.6" opacity="0.2"/>
    <circle cx="24" cy="34" r="1.6" opacity="0.2"/>
    <circle cx="24" cy="46" r="1.6" opacity="0.2"/>
    <circle cx="24" cy="56" r="1.6" opacity="0.2"/>
    <!-- Layer 3 -->
    <circle cx="40" cy="18" r="1.6" opacity="0.2"/>
    <circle cx="40" cy="32" r="1.6" opacity="0.2"/>
    <circle cx="40" cy="46" r="1.6" opacity="0.2"/>
    <!-- Layer 4 -->
    <circle cx="54" cy="22" r="1.8" opacity="0.25"/>
    <circle cx="54" cy="38" r="1.8" opacity="0.25"/>
    <circle cx="54" cy="52" r="1.8" opacity="0.25"/>
  </g>

  <!-- Anchor — bold, centered, clean -->
  <g transform="translate(32,32)">
    <!-- Ring at top -->
    <circle cx="0" cy="-16" r="4.5" fill="none" stroke="#38bdf8" stroke-width="3"/>
    <!-- Vertical shaft -->
    <line x1="0" y1="-11" x2="0" y2="18" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>
    <!-- Horizontal crossbar -->
    <line x1="-10" y1="-2" x2="10" y2="-2" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>
    <!-- Curved flukes (arms) -->
    <path d="M0,18 Q-2,18 -6,14 Q-12,8 -14,4" fill="none" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>
    <path d="M0,18 Q2,18 6,14 Q12,8 14,4" fill="none" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>
    <!-- Fluke tips (arrow points) -->
    <circle cx="-14" cy="4" r="1.5" fill="#38bdf8"/>
    <circle cx="14" cy="4" r="1.5" fill="#38bdf8"/>
  </g>
</svg>