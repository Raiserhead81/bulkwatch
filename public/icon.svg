<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Dark circle background -->
  <circle cx="32" cy="32" r="30" fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>

  <!-- Neural mesh — thick visible lines -->
  <!-- Outer connections -->
  <line x1="10" y1="10" x2="32" y2="6" stroke="#1d4ed8" stroke-width="1.2" opacity="0.6"/>
  <line x1="32" y1="6" x2="54" y2="10" stroke="#1d4ed8" stroke-width="1.2" opacity="0.6"/>
  <line x1="54" y1="10" x2="58" y2="32" stroke="#1d4ed8" stroke-width="1.2" opacity="0.5"/>
  <line x1="58" y1="32" x2="52" y2="52" stroke="#1d4ed8" stroke-width="1.2" opacity="0.5"/>
  <line x1="52" y1="52" x2="32" y2="58" stroke="#1d4ed8" stroke-width="1.2" opacity="0.6"/>
  <line x1="32" y1="58" x2="12" y2="52" stroke="#1d4ed8" stroke-width="1.2" opacity="0.6"/>
  <line x1="12" y1="52" x2="6" y2="32" stroke="#1d4ed8" stroke-width="1.2" opacity="0.5"/>
  <line x1="6" y1="32" x2="10" y2="10" stroke="#1d4ed8" stroke-width="1.2" opacity="0.5"/>
  
  <!-- Cross connections (spider web feel) -->
  <line x1="10" y1="10" x2="54" y2="10" stroke="#2563eb" stroke-width="0.8" opacity="0.3"/>
  <line x1="54" y1="10" x2="52" y2="52" stroke="#2563eb" stroke-width="0.8" opacity="0.3"/>
  <line x1="52" y1="52" x2="12" y2="52" stroke="#2563eb" stroke-width="0.8" opacity="0.3"/>
  <line x1="12" y1="52" x2="10" y2="10" stroke="#2563eb" stroke-width="0.8" opacity="0.3"/>
  <line x1="10" y1="10" x2="52" y2="52" stroke="#2563eb" stroke-width="0.8" opacity="0.2"/>
  <line x1="54" y1="10" x2="12" y2="52" stroke="#2563eb" stroke-width="0.8" opacity="0.2"/>
  <line x1="32" y1="6" x2="32" y2="58" stroke="#2563eb" stroke-width="0.8" opacity="0.25"/>
  <line x1="6" y1="32" x2="58" y2="32" stroke="#2563eb" stroke-width="0.8" opacity="0.25"/>
  
  <!-- Inner web -->
  <line x1="20" y1="16" x2="44" y2="16" stroke="#3b82f6" stroke-width="0.8" opacity="0.35"/>
  <line x1="44" y1="16" x2="50" y2="38" stroke="#3b82f6" stroke-width="0.8" opacity="0.35"/>
  <line x1="50" y1="38" x2="38" y2="50" stroke="#3b82f6" stroke-width="0.8" opacity="0.35"/>
  <line x1="38" y1="50" x2="26" y2="50" stroke="#3b82f6" stroke-width="0.8" opacity="0.35"/>
  <line x1="26" y1="50" x2="14" y2="38" stroke="#3b82f6" stroke-width="0.8" opacity="0.35"/>
  <line x1="14" y1="38" x2="20" y2="16" stroke="#3b82f6" stroke-width="0.8" opacity="0.35"/>
  <!-- Inner cross -->
  <line x1="20" y1="16" x2="38" y2="50" stroke="#3b82f6" stroke-width="0.6" opacity="0.2"/>
  <line x1="44" y1="16" x2="26" y2="50" stroke="#3b82f6" stroke-width="0.6" opacity="0.2"/>
  <line x1="14" y1="38" x2="50" y2="38" stroke="#3b82f6" stroke-width="0.6" opacity="0.2"/>

  <!-- Nodes (outer) -->
  <circle cx="32" cy="6" r="2.5" fill="#1d4ed8" opacity="0.7"/>
  <circle cx="54" cy="10" r="2.5" fill="#1d4ed8" opacity="0.7"/>
  <circle cx="58" cy="32" r="2.5" fill="#1d4ed8" opacity="0.6"/>
  <circle cx="52" cy="52" r="2.5" fill="#1d4ed8" opacity="0.7"/>
  <circle cx="32" cy="58" r="2.5" fill="#1d4ed8" opacity="0.7"/>
  <circle cx="12" cy="52" r="2.5" fill="#1d4ed8" opacity="0.7"/>
  <circle cx="6" cy="32" r="2.5" fill="#1d4ed8" opacity="0.6"/>
  <circle cx="10" cy="10" r="2.5" fill="#1d4ed8" opacity="0.7"/>
  
  <!-- Nodes (inner) -->
  <circle cx="20" cy="16" r="2" fill="#3b82f6" opacity="0.7"/>
  <circle cx="44" cy="16" r="2" fill="#3b82f6" opacity="0.7"/>
  <circle cx="50" cy="38" r="2" fill="#3b82f6" opacity="0.7"/>
  <circle cx="38" cy="50" r="2" fill="#3b82f6" opacity="0.7"/>
  <circle cx="26" cy="50" r="2" fill="#3b82f6" opacity="0.7"/>
  <circle cx="14" cy="38" r="2" fill="#3b82f6" opacity="0.7"/>

  <!-- ═══ ANCHOR (foreground, white/cyan, bold) ═══ -->
  <!-- Ring -->
  <circle cx="32" cy="16" r="5" stroke="#38bdf8" stroke-width="2.5" fill="#0f172a"/>
  <!-- Shaft -->
  <line x1="32" y1="21" x2="32" y2="52" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>
  <!-- Crossbar -->
  <line x1="24" y1="30" x2="40" y2="30" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>
  <!-- Flukes -->
  <path d="M19 44c0 8 5.8 12 13 12s13-4 13-12" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <line x1="19" y1="44" x2="17" y2="40" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="45" y1="44" x2="47" y2="40" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round"/>
</svg>
