  <!-- Flukes -->
  <path d="M23 42c0 6 4 9 9 9s9-3 9-9" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <line x1="23" y1="42" x2="21" y2="39" stroke="#38bdf8" stroke-width="2" stroke-linecap="round"/>
