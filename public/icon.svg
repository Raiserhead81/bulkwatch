<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <!-- Neural connections — 6 nodes, thick glowing lines -->
  <line x1="6" y1="8" x2="32" y2="20" stroke="url(#g2)" stroke-width="2"/>
  <line x1="6" y1="8" x2="58" y2="14" stroke="url(#g2)" stroke-width="1.5"/>
  <line x1="6" y1="56" x2="32" y2="20" stroke="url(#g2)" stroke-width="1.5"/>
  <line x1="6" y1="56" x2="58" y2="50" stroke="url(#g2)" stroke-width="2"/>
  <line x1="58" y1="14" x2="32" y2="20" stroke="url(#g2)" stroke-width="2"/>
  <line x1="58" y1="14" x2="58" y2="50" stroke="url(#g2)" stroke-width="1.5"/>
  <line x1="58" y1="50" x2="32" y2="20" stroke="url(#g2)" stroke-width="1.5"/>
  <line x1="6" y1="8" x2="6" y2="56" stroke="url(#g2)" stroke-width="1.5"/>
  <line x1="6" y1="8" x2="58" y2="50" stroke="url(#g2)" stroke-width="1"/>
  <line x1="6" y1="56" x2="58" y2="14" stroke="url(#g2)" stroke-width="1"/>
  <line x1="32" y1="20" x2="32" y2="56" stroke="url(#g2)" stroke-width="1"/>
  <line x1="6" y1="56" x2="32" y2="56" stroke="url(#g2)" stroke-width="1.5"/>
  <line x1="32" y1="56" x2="58" y2="50" stroke="url(#g2)" stroke-width="1.5"/>

  <!-- Network nodes — gradient dots -->
  <circle cx="6" cy="8" r="3" fill="url(#g1)" opacity="0.3"/>
  <circle cx="58" cy="14" r="3" fill="url(#g1)" opacity="0.3"/>
  <circle cx="6" cy="56" r="3" fill="url(#g1)" opacity="0.3"/>
  <circle cx="58" cy="50" r="3" fill="url(#g1)" opacity="0.3"/>
  <circle cx="32" cy="56" r="2.5" fill="url(#g1)" opacity="0.25"/>
  <circle cx="32" cy="20" r="2.5" fill="url(#g1)" opacity="0.25"/>

  <!-- ═══ ANCHOR — bold gradient, center stage ═══ -->
  <!-- Ring -->
  <circle cx="32" cy="16" r="6" stroke="url(#g1)" stroke-width="3" fill="none"/>
  <!-- Shaft -->
  <line x1="32" y1="22" x2="32" y2="52" stroke="url(#g1)" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Crossbar -->
  <line x1="23" y1="32" x2="41" y2="32" stroke="url(#g1)" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Flukes -->
  <path d="M20 45c0 7 5.5 10.5 12 10.5s12-3.5 12-10.5" stroke="url(#g1)" stroke-width="3" stroke-linecap="round" fill="none"/>
  <line x1="20" y1="45" x2="17" y2="40" stroke="url(#g1)" stroke-width="3" stroke-linecap="round"/>
  <line x1="44" y1="45" x2="47" y2="40" stroke="url(#g1)" stroke-width="3" stroke-linecap="round"/>
</svg>
