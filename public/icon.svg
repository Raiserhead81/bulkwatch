<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Neural network mesh background -->
  <!-- Outer ring nodes -->
  <circle cx="32" cy="4" r="1.5" fill="#1e40af" opacity="0.4"/>
  <circle cx="50" cy="10" r="1.5" fill="#1e40af" opacity="0.4"/>
  <circle cx="58" cy="26" r="1.5" fill="#1e40af" opacity="0.4"/>
  <circle cx="54" cy="44" r="1.5" fill="#1e40af" opacity="0.4"/>
  <circle cx="42" cy="58" r="1.5" fill="#1e40af" opacity="0.4"/>
  <circle cx="22" cy="58" r="1.5" fill="#1e40af" opacity="0.4"/>
  <circle cx="10" cy="44" r="1.5" fill="#1e40af" opacity="0.4"/>
  <circle cx="6" cy="26" r="1.5" fill="#1e40af" opacity="0.4"/>
  <circle cx="14" cy="10" r="1.5" fill="#1e40af" opacity="0.4"/>
  
  <!-- Inner ring nodes -->
  <circle cx="32" cy="14" r="1.2" fill="#3b82f6" opacity="0.5"/>
  <circle cx="44" cy="20" r="1.2" fill="#3b82f6" opacity="0.5"/>
  <circle cx="48" cy="34" r="1.2" fill="#3b82f6" opacity="0.5"/>
  <circle cx="40" cy="48" r="1.2" fill="#3b82f6" opacity="0.5"/>
  <circle cx="24" cy="48" r="1.2" fill="#3b82f6" opacity="0.5"/>
  <circle cx="16" cy="34" r="1.2" fill="#3b82f6" opacity="0.5"/>
  <circle cx="20" cy="20" r="1.2" fill="#3b82f6" opacity="0.5"/>
  
  <!-- Core nodes -->
  <circle cx="32" cy="28" r="1" fill="#60a5fa" opacity="0.6"/>
  <circle cx="38" cy="38" r="1" fill="#60a5fa" opacity="0.6"/>
  <circle cx="26" cy="38" r="1" fill="#60a5fa" opacity="0.6"/>

  <!-- Mesh connections outer→inner -->
  <line x1="32" y1="4" x2="32" y2="14" stroke="#1e40af" stroke-width="0.5" opacity="0.25"/>
  <line x1="32" y1="4" x2="44" y2="20" stroke="#1e40af" stroke-width="0.5" opacity="0.15"/>
  <line x1="32" y1="4" x2="20" y2="20" stroke="#1e40af" stroke-width="0.5" opacity="0.15"/>
  <line x1="50" y1="10" x2="44" y2="20" stroke="#1e40af" stroke-width="0.5" opacity="0.25"/>
  <line x1="50" y1="10" x2="32" y2="14" stroke="#1e40af" stroke-width="0.5" opacity="0.15"/>
  <line x1="58" y1="26" x2="48" y2="34" stroke="#1e40af" stroke-width="0.5" opacity="0.25"/>
  <line x1="58" y1="26" x2="44" y2="20" stroke="#1e40af" stroke-width="0.5" opacity="0.2"/>
  <line x1="54" y1="44" x2="48" y2="34" stroke="#1e40af" stroke-width="0.5" opacity="0.25"/>
  <line x1="54" y1="44" x2="40" y2="48" stroke="#1e40af" stroke-width="0.5" opacity="0.2"/>
  <line x1="42" y1="58" x2="40" y2="48" stroke="#1e40af" stroke-width="0.5" opacity="0.25"/>
  <line x1="22" y1="58" x2="24" y2="48" stroke="#1e40af" stroke-width="0.5" opacity="0.25"/>
  <line x1="10" y1="44" x2="16" y2="34" stroke="#1e40af" stroke-width="0.5" opacity="0.25"/>
  <line x1="10" y1="44" x2="24" y2="48" stroke="#1e40af" stroke-width="0.5" opacity="0.2"/>
  <line x1="6" y1="26" x2="16" y2="34" stroke="#1e40af" stroke-width="0.5" opacity="0.25"/>
  <line x1="6" y1="26" x2="20" y2="20" stroke="#1e40af" stroke-width="0.5" opacity="0.2"/>
  <line x1="14" y1="10" x2="20" y2="20" stroke="#1e40af" stroke-width="0.5" opacity="0.25"/>
  <line x1="14" y1="10" x2="32" y2="14" stroke="#1e40af" stroke-width="0.5" opacity="0.15"/>

  <!-- Mesh connections inner→inner -->
  <line x1="32" y1="14" x2="44" y2="20" stroke="#3b82f6" stroke-width="0.5" opacity="0.2"/>
  <line x1="32" y1="14" x2="20" y2="20" stroke="#3b82f6" stroke-width="0.5" opacity="0.2"/>
  <line x1="44" y1="20" x2="48" y2="34" stroke="#3b82f6" stroke-width="0.5" opacity="0.2"/>
  <line x1="48" y1="34" x2="40" y2="48" stroke="#3b82f6" stroke-width="0.5" opacity="0.2"/>
  <line x1="40" y1="48" x2="24" y2="48" stroke="#3b82f6" stroke-width="0.5" opacity="0.2"/>
  <line x1="24" y1="48" x2="16" y2="34" stroke="#3b82f6" stroke-width="0.5" opacity="0.2"/>
  <line x1="16" y1="34" x2="20" y2="20" stroke="#3b82f6" stroke-width="0.5" opacity="0.2"/>

  <!-- Mesh connections inner→core -->
  <line x1="32" y1="14" x2="32" y2="28" stroke="#60a5fa" stroke-width="0.5" opacity="0.3"/>
  <line x1="44" y1="20" x2="38" y2="38" stroke="#60a5fa" stroke-width="0.5" opacity="0.2"/>
  <line x1="20" y1="20" x2="26" y2="38" stroke="#60a5fa" stroke-width="0.5" opacity="0.2"/>
  <line x1="48" y1="34" x2="38" y2="38" stroke="#60a5fa" stroke-width="0.5" opacity="0.2"/>
  <line x1="16" y1="34" x2="26" y2="38" stroke="#60a5fa" stroke-width="0.5" opacity="0.2"/>
  <line x1="32" y1="28" x2="38" y2="38" stroke="#60a5fa" stroke-width="0.5" opacity="0.3"/>
  <line x1="32" y1="28" x2="26" y2="38" stroke="#60a5fa" stroke-width="0.5" opacity="0.3"/>
  <line x1="26" y1="38" x2="38" y2="38" stroke="#60a5fa" stroke-width="0.5" opacity="0.25"/>

  <!-- Cross connections for density -->
  <line x1="42" y1="58" x2="24" y2="48" stroke="#1e40af" stroke-width="0.4" opacity="0.1"/>
  <line x1="22" y1="58" x2="40" y2="48" stroke="#1e40af" stroke-width="0.4" opacity="0.1"/>
  <line x1="50" y1="10" x2="48" y2="34" stroke="#1e40af" stroke-width="0.4" opacity="0.1"/>
  <line x1="14" y1="10" x2="16" y2="34" stroke="#1e40af" stroke-width="0.4" opacity="0.1"/>

  <!-- ═══ ANCHOR (foreground, bold, bright) ═══ -->
  <!-- Anchor ring -->
  <circle cx="32" cy="16" r="5" stroke="#38bdf8" stroke-width="2.5" fill="none"/>
  <!-- Anchor shaft -->
  <path d="M32 21V52" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>
  <!-- Anchor crossbar -->
  <path d="M23 30h18" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>
  <!-- Anchor flukes -->
  <path d="M18 44c0 8.5 6 12.5 14 12.5s14-4 14-12.5" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>
  <!-- Anchor fluke tips -->
  <path d="M18 44l-2-4" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M46 44l2-4" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round"/>
</svg>
