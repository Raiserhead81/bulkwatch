<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Anchor body -->
  <path d="M32 20V52" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>
  <path d="M20 42c0 8 5.4 12 12 12s12-4 12-12" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>
  <path d="M24 30h16" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Brain/neural network in the anchor ring -->
  <circle cx="32" cy="14" r="8" stroke="#38bdf8" stroke-width="2.5"/>
  
  <!-- Neural nodes inside the circle -->
  <circle cx="29" cy="12" r="1.5" fill="#2563eb"/>
  <circle cx="35" cy="12" r="1.5" fill="#2563eb"/>
  <circle cx="32" cy="16" r="1.5" fill="#2563eb"/>
  <circle cx="28" cy="16" r="1.2" fill="#60a5fa"/>
  <circle cx="36" cy="16" r="1.2" fill="#60a5fa"/>
  <circle cx="32" cy="10" r="1.2" fill="#60a5fa"/>
  
  <!-- Neural connections -->
  <line x1="29" y1="12" x2="35" y2="12" stroke="#60a5fa" stroke-width="0.7" opacity="0.6"/>
  <line x1="29" y1="12" x2="32" y2="16" stroke="#60a5fa" stroke-width="0.7" opacity="0.6"/>
  <line x1="35" y1="12" x2="32" y2="16" stroke="#60a5fa" stroke-width="0.7" opacity="0.6"/>
  <line x1="28" y1="16" x2="32" y2="10" stroke="#60a5fa" stroke-width="0.7" opacity="0.4"/>
  <line x1="36" y1="16" x2="32" y2="10" stroke="#60a5fa" stroke-width="0.7" opacity="0.4"/>
  <line x1="29" y1="12" x2="28" y2="16" stroke="#60a5fa" stroke-width="0.7" opacity="0.4"/>
  <line x1="35" y1="12" x2="36" y2="16" stroke="#60a5fa" stroke-width="0.7" opacity="0.4"/>
  
  <!-- Pulse dots on anchor arms (data flow) -->
  <circle cx="22" cy="30" r="1.5" fill="#38bdf8" opacity="0.8"/>
  <circle cx="42" cy="30" r="1.5" fill="#38bdf8" opacity="0.8"/>
</svg>
